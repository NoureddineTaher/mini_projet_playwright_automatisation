name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # JOB 1 : Tests API (Rapides)
  test_api:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install dependencies
      run: npm ci
    - name: Run API tests
      run: npx playwright test tests/api-credit.spec.ts
    # On sauvegarde les résultats API temporairement
    - name: Upload API results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: api-results
        path: playwright-report/
        retention-days: 1

  # JOB 2 : Tests UI (Plus longs) - S'exécute APRES l'API
  test_ui:
    needs: test_api
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    # IMPORTANT : On lance TOUS les tests ici pour générer le rapport complet
    # Cela garantit que le rapport final contient les 6 tests (cite: image_74c209.png)
    - name: Run All tests (API + UI)
      run: npx playwright test

    # On prépare l'artefact pour GitHub Pages
    - name: Upload artifact
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report/

  # JOB 3 : Déploiement (Attend que UI soit fini)
  deploy:
    needs: test_ui
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4