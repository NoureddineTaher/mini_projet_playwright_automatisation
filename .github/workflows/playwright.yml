name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # JOB 1 : Tests API
  test_api:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install dependencies
      run: npm ci
    - name: Run API tests
      run: npx playwright test tests/api-credit.spec.ts
    - name: Upload API results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: api-results
        path: playwright-report/
        retention-days: 1

  # JOB 2 : Tests UI
  test_ui:
    needs: test_api
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run All tests (API + UI)
      run: npx playwright test
    - name: Upload artifact
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report/

  # JOB 3 : Déploiement
  deploy:
    needs: test_ui
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  # ---  JOB DE NOTIFICATION ---
  notify_failure:
    needs: [test_api, test_ui, deploy]
    if: failure() # S'exécute uniquement si un job précédent a échoué
    runs-on: ubuntu-latest
    steps:
      - name: Send custom mail
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.mail.yahoo.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 Failure Alert: ${{ github.repository }}"
          to: noureddine_taher@yahoo.com
          from: GitHub Actions
          body: |
            Hello,
            The pipeline execution has failed.
            
            Details:
            - Pipeline ID: ${{ github.run_id }}
            - Job Name: ${{ github.job }}
            - Test Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
            
            Please review the failure details and take the necessary actions.
            
            Best regards,